server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      httpclient:
        connect-timeout: 5000
        response-timeout: 10s

      routes:
        - id: login-api
          uri: lb://login-service
          predicates:
            - Path=/api/login/**, /api/usuario/**

        - id: cliente-api
          uri: lb://cliente-service
          predicates:
            - Path=/api/cliente/**

        - id: produto-pedidos-api
          uri: lb://produto-service
          predicates:
            - Path=/api/produto/**, /api/pedido/**

    discovery:
      client:
        simple:
          instances:
            login-service:
              - uri: ${LOGIN_URL:http://localhost:8081}
            cliente-service:
              - uri: ${CLIENTE_URL:http://localhost:8082}
            produto-service:
              - uri: ${PRODUTO_URL:http://localhost:8083}